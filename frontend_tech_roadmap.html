<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端技术栈发展路径图 (2016-2026)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #fdfcf9;
            --bg-secondary: #f5f5f7;
            --bg-card: #ffffff;
            --accent-primary: #34c759;
            --accent-secondary: #30d158;
            --accent-tertiary: #a8e6cf;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --border-color: #e5e5e7;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-hover: rgba(52, 199, 89, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .timeline {
            position: relative;
            padding: 40px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-tertiary));
        }

        .year-section {
            margin-bottom: 60px;
            position: relative;
        }

        .year-marker {
            position: relative;
            display: inline-block;
            margin-left: 0;
            margin-bottom: 30px;
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 30px;
            border: 2px solid var(--accent-primary);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-primary);
            box-shadow: 0 2px 12px var(--shadow);
        }

        .popular-stack {
            background: linear-gradient(135deg, rgba(52, 199, 89, 0.05), rgba(168, 230, 207, 0.05));
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            margin-left: 80px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .stack-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .stack-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stack-tag {
            display: inline-block;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--accent-primary);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent-primary);
        }

        .stack-reason {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .tech-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding-left: 80px;
        }

        .tech-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            width: 100%;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .tech-card:hover {
            transform: translateX(5px);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 20px var(--shadow-hover);
        }

        .tech-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .tech-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .tech-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tech-category {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .category-framework {
            background: rgba(52, 199, 89, 0.15);
            color: var(--accent-primary);
        }

        .category-tool {
            background: rgba(48, 209, 88, 0.15);
            color: var(--accent-secondary);
        }

        .category-library {
            background: rgba(168, 230, 207, 0.3);
            color: #00a67e;
        }

        .tech-description {
            color: var(--text-secondary);
            margin: 15px 0;
            line-height: 1.8;
        }

        .tech-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .tech-card.expanded .tech-details {
            max-height: 3000px;
        }

        .expand-icon {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            color: var(--text-secondary);
        }

        .tech-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .tutorial-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-list {
            list-style: none;
            margin: 15px 0;
        }

        .feature-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: var(--text-secondary);
        }

        .feature-list li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--accent-primary);
            font-weight: 700;
        }

        .code-block {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 0;
            margin: 15px 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .code-block pre {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        .code-block code {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .timeline::before {
                left: 10px;
            }

            .tech-grid {
                padding-left: 40px;
                gap: 20px;
            }

            .popular-stack {
                margin-left: 40px;
                padding: 20px;
            }

            .stack-title {
                font-size: 1.1rem;
            }

            .stack-tags {
                gap: 8px;
            }

            .stack-tag {
                font-size: 0.85rem;
                padding: 5px 12px;
            }

            .tech-card {
                padding: 20px;
            }

            .year-marker {
                font-size: 1.1rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>

class ErrorBoundary extends React.Component {

function Counter() {

  useEffect(() => {

    return () => {

  }, [count]);

// 自定义Hook
function useWindowWidth() {
  const [width, setWidth] = useState(window.innerWidth);

  useEffect(() => {
    const handleResize = () => setWidth(window.innerWidth);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  return width;
}`

function TodoApp() {
  const [todos, setTodos] = useState([]);
  const [filter, setFilter] = useState('all');

  // 副作用处理
  useEffect(() => {
    fetch('/api/todos')
      .then(res => res.json())
      .then(data => setTodos(data));
  }, []);

  // 记忆化回调
  const addTodo = useCallback((text) => {
    setTodos(prev => [...prev, { id: Date.now(), text, done: false }]);
  }, []);

  // 记忆化计算
  const filteredTodos = useMemo(() => {
    return todos.filter(todo => {
      if (filter === 'active') return !todo.done;
      if (filter === 'completed') return todo.done;
      return true;
    });
  }, [todos, filter]);

  return (
    <div>
      <TodoList todos={filteredTodos} />
      <FilterButtons filter={filter} setFilter={setFilter} />
    </div>
  );
}`

        headers: { 'Content-Type': 'application/json' }
      });
    }

    return new Response('Hello from Edge!');
  }
};

        // 渲染函数
        function renderTechCard(tech) {
            const categoryClass = `category-${tech.category}`;
            const categoryName = {
                'framework': '框架',
                'tool': '工具',
                'library': '库'
            }[tech.category];

            return `
                <div class="tech-card" data-tech="${tech.name}">
                    <div class="expand-icon">▼</div>
                    <div class="tech-header">
                        <div class="tech-icon">${tech.icon}</div>
                        <div>
                            <div class="tech-title">${tech.name}</div>
                            <span class="tech-category ${categoryClass}">${categoryName}</span>
                        </div>
                    </div>
                    <p class="tech-description">${tech.description}</p>

                    <div class="tech-details">
                        <div class="tutorial-section">
                            <div class="section-title">📚 核心特性</div>
                            <ul class="feature-list">
                                ${tech.features.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="tutorial-section">
                            <div class="section-title">💡 使用教程</div>
                            <p class="tech-description">${tech.tutorial}</p>
                        </div>

                        <div class="tutorial-section">
                            <div class="section-title">🔧 代码示例</div>
                            <div class="code-block">
                                <pre><code class="language-javascript">${escapeHtml(tech.example)}</code></pre>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderYearSection(year, techs) {
            const stack = popularStacks[year];
            return `
                <div class="year-section">
                    <div class="year-marker">${year}</div>
                    ${stack ? `
                        <div class="popular-stack">
                            <div class="stack-title">🔥 ${stack.name}</div>
                            <div class="stack-tags">
                                ${stack.stack.map(tech => `<span class="stack-tag">${tech}</span>`).join('')}
                            </div>
                            <div class="stack-reason">${stack.reason}</div>
                        </div>
                    ` : ''}
                    <div class="tech-grid">
                        ${techs.map(tech => renderTechCard(tech)).join('')}
                    </div>
                </div>
            `;
        }

        // HTML转义
        function escapeHtml(code) {
            return code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 初始化页面
        function init() {
            const timeline = document.getElementById('timeline');
            const years = Object.keys(techData).sort((a, b) => a - b);

            timeline.innerHTML = years.map(year =>
                renderYearSection(year, techData[year])
            ).join('');

            // 添加点击事件
            document.querySelectorAll('.tech-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    // 如果点击的是代码块内部，不触发展开/收起
                    if (e.target.closest('.code-block')) return;

                    this.classList.toggle('expanded');
                });
            });

            // 添加入场动画
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '0';
                        entry.target.style.transform = 'translateY(20px)';
                        setTimeout(() => {
                            entry.target.style.transition = 'all 0.6s ease';
                            entry.target.style.opacity = '1';
                            entry.target.style.transform = 'translateY(0)';
                        }, 100);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.tech-card').forEach(card => {
                observer.observe(card);
            });

            // 初始化代码高亮
            if (typeof hljs !== 'undefined') {
                hljs.highlightAll();
            }
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
